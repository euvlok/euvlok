version = 1

[display]
format = "text"
color = "always"
theme = "auto"
icons = "nerd"
separator = " │ "
align = true
hyperlinks = "auto"

[statusline]
lines = [
  ["dir", "context", "quota", "pace", "vcs"],
  ["model", "changes", "elapsed", "cache"],
]

[segments.cache]
type = "cache"

[segments.changes]
type = "diff"

[segments.context]
type = "context"
format = "auto"
show-output-tokens = true

[segments.dir]
type = "dir"
style = "home"

[segments.elapsed]
type = "clock"
show-api-time = true

[segments.model]
type = "model"
shorten = true

[segments.pace]
type = "pace"
lookback-mins = 20
cool-below = 0.9
hot-above = 1.2
warmup-mins = 10
glyphs = "mdi"
debug = false

[segments.quota]
type = "rate-limits"
show = ["five-hour", "seven-day"]
seven-day-threshold = 80
show-countdown = true

[segments.vcs]
type = "vcs"
show-hash = true
show-bookmark = true
show-dirty = true
show-stash = true
show-ahead-behind = true
