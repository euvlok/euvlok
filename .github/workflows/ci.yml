name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun:
    name: Bun
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun dependencies
        uses: ./.github/actions/setup-bun-dependencies

      - name: Check TypeScript and workflow tooling
        run: bun run check

      - name: Run tests
        run: bun test

      - name: Audit changed code with Fallow
        uses: fallow-rs/fallow@f0d35e73de3526e05c3d19f25c785f56b4bee230 # v2.72.0
        with:
          command: audit
          fail-on-issues: true
          gate: new-only
          version: 2.72.0

  nix:
    name: Nix (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          github_access_token: ${{ github.token }}
          extra_nix_config: |
            accept-flake-config = true

      - name: Check flake inputs
        run: nix flake metadata

      - name: Run pre-commit checks
        run: nix build --print-build-logs .#checks.${{ matrix.system }}.pre-commit

      - name: Build packages
        run: |
          nix build --print-build-logs \
            .#packages.${{ matrix.system }}.auto-rebase \
            .#packages.${{ matrix.system }}.browser-extension-update \
            .#packages.${{ matrix.system }}.nvidia-prefetch
