name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cachix:
    name: Cachix Auth
    runs-on: ubuntu-latest
    outputs:
      skip-push: ${{ steps.auth.outputs.skip-push }}
    steps:
      - name: Check Cachix token availability
        id: auth
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [ -n "${CACHIX_AUTH_TOKEN}" ]; then
            echo "skip-push=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip-push=true" >> "$GITHUB_OUTPUT"
          fi

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check README links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --no-progress --verbose --exclude '^https://nixos.org/manual/nixpkgs/stable/?$' README.md
          fail: true

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check Rust code
        run: cargo check --workspace --all-targets --all-features

      - name: Check workflow files
        run: cargo run --package github-maintenance -- check-workflows

      - name: Lint Rust code
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test Rust code
        run: cargo test --workspace --all-features

  nix:
    name: Nix (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    needs: cachix
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ github.token }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-skip-push: ${{ needs.cachix.outputs.skip-push }}

      - name: Check flake inputs
        run: nix flake metadata

      - name: Run pre-commit checks
        run: nix build --print-build-logs .#checks.${{ matrix.system }}.pre-commit

      - name: Build packages
        run: |
          nix build --print-build-logs \
            .#packages.${{ matrix.system }}.auto-rebase \
            .#packages.${{ matrix.system }}.bootstrap \
            .#packages.${{ matrix.system }}.browser-extension-update \
            .#packages.${{ matrix.system }}.catppuccin-userstyles \
            .#packages.${{ matrix.system }}.chezmoi-support \
            .#packages.${{ matrix.system }}.github-maintenance \
            .#packages.${{ matrix.system }}.nvidia-prefetch \
            .#packages.${{ matrix.system }}.zellij-theme-tools
