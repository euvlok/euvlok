name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cachix:
    name: Cachix Auth
    runs-on: ubuntu-latest
    outputs:
      skip-push: ${{ steps.auth.outputs.skip-push }}
    steps:
      - name: Check Cachix token availability
        id: auth
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [ -n "${CACHIX_AUTH_TOKEN}" ]; then
            echo "skip-push=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip-push=true" >> "$GITHUB_OUTPUT"
          fi

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check README links
        uses: lycheeverse/lychee-action@885c65f3dc543b57c898c8099f4e08c8afd178a2 # v2.6.1
        with:
          args: --no-progress --verbose README.md
          fail: true

  bun:
    name: Bun
    runs-on: ubuntu-latest
    needs: cachix
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Nix and Bun dependencies
        uses: ./.github/actions/setup-nix-bun-dependencies
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-skip-push: ${{ needs.cachix.outputs.skip-push }}

      - name: Check TypeScript and workflow tooling
        run: bun run check

      - name: Run tests
        run: nix develop --impure --command bun test

      - name: Audit changed code with Fallow
        uses: fallow-rs/fallow@195102a4949f221b531d1b62edaa7e5ff1cece52 # v2.75.0
        with:
          command: audit
          fail-on-issues: true
          gate: new-only
          version: 2.72.0

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check Rust code
        run: cargo check --workspace --all-targets --all-features

      - name: Lint Rust code
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test Rust code
        run: cargo test --workspace --all-features

  zig:
    name: Zig
    runs-on: ubuntu-latest
    env:
      ZIG_URL: https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
      ZIG_SHA256: 70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00
      ZIGLINT_URL: https://github.com/rockorager/ziglint/releases/download/v0.5.2/ziglint-x86_64-linux.tar.gz
      ZIGLINT_SHA256: 5eac6c175ff48830a0e0d9784a963cc2f35f2d53a465212cc953525e8f5df6bb
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Zig
        run: |
          mkdir -p "$RUNNER_TEMP/zig"
          curl --fail --location --silent --show-error "$ZIG_URL" --output "$RUNNER_TEMP/zig.tar.xz"
          echo "$ZIG_SHA256  $RUNNER_TEMP/zig.tar.xz" | sha256sum --check -
          tar --extract --xz --file "$RUNNER_TEMP/zig.tar.xz" --directory "$RUNNER_TEMP/zig" --strip-components 1
          echo "$RUNNER_TEMP/zig" >> "$GITHUB_PATH"

      - name: Check Zig version
        run: test "$(zig version)" = "0.16.0"

      - name: Check Zig formatting
        run: |
          zig fmt --check .ziglint.zon build.zig
          find \
            lib/zig/chezmoi \
            dotfiles/flameflag/.chezmoiscripts \
            hosts/hm/lay-by/hyprland/scripts/src \
            -name '*.zig' \
            -print0 \
            | xargs -0 zig fmt --check

      - name: Install Zig linter
        run: |
          mkdir -p "$RUNNER_TEMP/ziglint"
          curl --fail --location --silent --show-error "$ZIGLINT_URL" --output "$RUNNER_TEMP/ziglint.tar.gz"
          echo "$ZIGLINT_SHA256  $RUNNER_TEMP/ziglint.tar.gz" | sha256sum --check -
          tar --extract --gzip --file "$RUNNER_TEMP/ziglint.tar.gz" --directory "$RUNNER_TEMP/ziglint"
          echo "$RUNNER_TEMP/ziglint" >> "$GITHUB_PATH"

      - name: Lint Zig code
        run: ziglint

      - name: Check Zig code
        run: zig build check

      - name: Test Zig code
        run: zig build test

  nix:
    name: Nix (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    needs: cachix
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ github.token }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-skip-push: ${{ needs.cachix.outputs.skip-push }}

      - name: Check flake inputs
        run: nix flake metadata

      - name: Run pre-commit checks
        run: nix build --print-build-logs .#checks.${{ matrix.system }}.pre-commit

      - name: Build packages
        run: |
          nix build --print-build-logs \
            .#packages.${{ matrix.system }}.auto-rebase \
            .#packages.${{ matrix.system }}.browser-extension-update \
            .#packages.${{ matrix.system }}.nvidia-prefetch
