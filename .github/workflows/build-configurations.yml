              --input - <<< "${dispatch_payload}"
          )"
          retry_run_url="$(jq --raw-output '.html_url // empty' <<< "${dispatch_response}")"

          {
            echo "### Soft timeout retry dispatched"
            echo
            echo "- Configuration: \`${RETRY_KIND} / ${RETRY_NAME}\`"
            echo "- Retry attempt: \`${next_attempt}\`"
            echo "- Timed-out derivation: \`${TIMEOUT_DRV}\`"
            if [ -n "${retry_run_url}" ]; then
              echo "- Retry run: ${retry_run_url}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Stop retrying repeated timeout
        if: >-
          steps.retry-target.outputs.should-build == 'true' &&
          steps.build.outputs.timed-out == 'true' &&
          steps.build.outputs.timeout-drv != '' &&
          steps.build.outputs.timeout-drv == inputs['last-timeout-drv']
        shell: bash
        env:
          TIMEOUT_DRV: ${{ steps.build.outputs.timeout-drv }}
        run: |
          {
            echo "### Stopping retries"
            echo
            echo "The runner timed out twice while building the same derivation:"
            echo
            echo "\`${TIMEOUT_DRV}\`"
            echo
            echo "No further retry was dispatched because the build appears stuck on one derivation that cannot finish on this runner."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Stop retrying after attempt limit
        if: >-
          steps.retry-target.outputs.should-build == 'true' &&
          steps.build.outputs.timed-out == 'true' &&
          steps.build.outputs.timeout-drv != '' &&
          fromJSON(inputs['retry-attempt'] || '0') >= 3 &&
          steps.build.outputs.timeout-drv != inputs['last-timeout-drv']
        shell: bash
        env:
          RETRY_ATTEMPT: ${{ inputs['retry-attempt'] || '0' }}
          TIMEOUT_DRV: ${{ steps.build.outputs.timeout-drv }}
        run: |
          {
            echo "### Stopping retries"
            echo
            echo "Retry attempt \`${RETRY_ATTEMPT}\` reached the configured attempt limit."
            echo
            echo "Last timed-out derivation: \`${TIMEOUT_DRV}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

