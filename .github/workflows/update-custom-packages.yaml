name: Update Custom Packages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

concurrency:
  group: update-custom-packages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cachix:
    name: Cachix Auth
    runs-on: ubuntu-latest
    outputs:
      skip-push: ${{ steps.auth.outputs.skip-push }}
    steps:
      - name: Check Cachix token availability
        id: auth
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [ -n "${CACHIX_AUTH_TOKEN}" ]; then
            echo "skip-push=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip-push=true" >> "$GITHUB_OUTPUT"
          fi

  update-packages:
    name: Update Custom Packages
    runs-on: ubuntu-latest
    needs: cachix
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-skip-push: ${{ needs.cachix.outputs.skip-push }}

      - name: Update packages
        run: nix develop --impure --command github-maintenance update-custom-packages
        env:
          GITHUB_TOKEN: ${{ github.token }}
