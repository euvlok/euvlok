name: Update Browser Extensions

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser type to update (all, chromium, firefox)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox
  schedule:
    - cron: '0 */8 * * *'

concurrency:
  group: update-browser-extensions-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  update-extensions:
    name: Update Browser Extensions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Update extensions
        run: nix run .#github-maintenance -- update-browser-extensions
        env:
          BROWSER: ${{ github.event.inputs.browser || 'all' }}
          GITHUB_TOKEN: ${{ github.token }}
