name: Update Browser Extensions

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser type to update (all, chromium, firefox)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox
  schedule:
    - cron: '0 */8 * * *'

concurrency:
  group: update-browser-extensions-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cachix:
    name: Cachix Auth
    runs-on: ubuntu-latest
    outputs:
      skip-push: ${{ steps.auth.outputs.skip-push }}
    steps:
      - name: Check Cachix token availability
        id: auth
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [ -n "${CACHIX_AUTH_TOKEN}" ]; then
            echo "skip-push=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip-push=true" >> "$GITHUB_OUTPUT"
          fi

  update-extensions:
    name: Update Browser Extensions
    runs-on: ubuntu-latest
    needs: cachix
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Nix and Bun dependencies
        uses: ./.github/actions/setup-nix-bun-dependencies
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-skip-push: ${{ needs.cachix.outputs.skip-push }}

      - name: Update extensions
        run: bun run github:update-browser-extensions
        env:
          BROWSER: ${{ github.event.inputs.browser || 'all' }}
          GITHUB_TOKEN: ${{ github.token }}
