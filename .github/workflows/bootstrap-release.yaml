name: Bootstrap Rolling Release

on:
  push:
    paths:
      - "bootstrap/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/bootstrap-release.yaml"
  workflow_dispatch: null

concurrency:
  group: bootstrap-rolling-release
  cancel-in-progress: true

permissions:
  contents: read # needed to checkout repository contents

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read # needed to checkout repository contents
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: linux-x86_64
            binary: bootstrap
          - runner: macos-latest
            asset: macos-aarch64
            binary: bootstrap
          - runner: windows-latest
            asset: windows-x86_64.exe
            binary: bootstrap.exe
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build bootstrap
        run: cargo build --locked --release --bin bootstrap

      - name: Stage Binary
        shell: bash
        env:
          ASSET: ${{ matrix.asset }}
          BINARY: ${{ matrix.binary }}
        run: |
          mkdir -p dist
          cp "target/release/${BINARY}" "dist/bootstrap-${ASSET}"

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bootstrap-${{ matrix.asset }}
          path: dist/bootstrap-${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish Rolling Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write # needed to publish the release
    steps:
      - name: Download Binary Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_tag="bootstrap-latest"
          release_title="Bootstrap Rolling Release"
          release_notes="Rolling bootstrap binaries for bootstrapping euvlok at ${GITHUB_SHA}."

          if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" dist/bootstrap-* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${release_tag}" dist/bootstrap-* \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${release_title}" \
              --notes "${release_notes}" \
              --latest
          fi
