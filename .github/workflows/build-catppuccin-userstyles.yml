name: Build Catppuccin Userstyles

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: build-catppuccin-userstyles-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Clone upstream userstyles
        run: git clone --depth 1 https://github.com/catppuccin/userstyles.git /tmp/userstyles

      - name: Generate Stylus imports
        run: nix run .#catppuccin-userstyles -- /tmp/userstyles /tmp/userstyles-output

      - name: Publish release
        run: |
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              if [ "${attempt}" = 3 ]; then
                return 1
              fi
              sleep "$((attempt * 10))"
            done
          }

          body="Catppuccin userstyles - latte light with dark flavor/accent variants. Gmail and Shinigami Eyes are excluded by default."

          if gh release view catppuccin-userstyles > /dev/null 2>&1; then
            retry gh release edit catppuccin-userstyles \
              --title "Catppuccin Userstyles" \
              --notes "$body"
            retry gh release upload catppuccin-userstyles /tmp/userstyles-output/* --clobber
          else
            retry gh release create catppuccin-userstyles /tmp/userstyles-output/* \
              --title "Catppuccin Userstyles" \
              --notes "$body" \
              --latest=false
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
