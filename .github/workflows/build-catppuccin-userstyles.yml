name: Build Catppuccin Userstyles

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Clone upstream userstyles
        run: git clone --depth 1 https://github.com/catppuccin/userstyles.git /tmp/userstyles

      - name: Generate Stylus imports
        run: bun scripts/build-catppuccin-userstyles.ts /tmp/userstyles /tmp/userstyles-output

      - uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: catppuccin-userstyles
          name: Catppuccin Userstyles
          body: Catppuccin userstyles - latte light with dark flavor/accent variants. Gmail and Shinigami Eyes are excluded by default.
          files: /tmp/userstyles-output/*
        env:
          GITHUB_TOKEN: ${{ github.token }}
