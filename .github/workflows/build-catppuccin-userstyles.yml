name: Build Catppuccin Userstyles

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: denoland/setup-deno@v2.0.3
        with:
          deno-version: v2.x

      - name: Clone and build upstream base
        run: |
          git clone --depth 1 https://github.com/catppuccin/userstyles.git /tmp/userstyles
          cd /tmp/userstyles
          deno task ci:stylus-import

      - name: Generate flavor/accent variants
        run: deno run --allow-read --allow-write scripts/build-catppuccin-userstyles.ts

      - uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: catppuccin-userstyles
          name: Catppuccin Userstyles
          body: Catppuccin userstyles - latte light with dark flavor/accent variants (45 total)
          files: /tmp/userstyles-output/*
        env:
          GITHUB_TOKEN: ${{ github.token }}
