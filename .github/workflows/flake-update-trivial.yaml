name: Update Trivial Flake Inputs

on:
  workflow_dispatch:
  schedule:
    # Run every 2 days at midnight UTC
    - cron: '0 0 */2 * *'

concurrency:
  group: update-trivial-flake-inputs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  update-trivial-inputs:
    name: Update Trivial Inputs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Update trivial inputs
        run: nix run .#github-maintenance -- update-trivial-flake-inputs
        env:
          GITHUB_TOKEN: ${{ github.token }}
