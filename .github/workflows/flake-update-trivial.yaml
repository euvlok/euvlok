name: Update Trivial Flake Inputs

on:
  workflow_dispatch:
  schedule:
    # Run every 2 days at midnight UTC
    - cron: '0 0 */2 * *'

concurrency:
  group: update-trivial-flake-inputs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cachix:
    name: Cachix Auth
    runs-on: ubuntu-latest
    outputs:
      skip-push: ${{ steps.auth.outputs.skip-push }}
    steps:
      - name: Check Cachix token availability
        id: auth
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [ -n "${CACHIX_AUTH_TOKEN}" ]; then
            echo "skip-push=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip-push=true" >> "$GITHUB_OUTPUT"
          fi

  update-trivial-inputs:
    name: Update Trivial Inputs
    runs-on: ubuntu-latest
    needs: cachix
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-skip-push: ${{ needs.cachix.outputs.skip-push }}

      - name: Update trivial inputs
        run: nix run .#github-maintenance -- update-trivial-flake-inputs
        env:
          GITHUB_TOKEN: ${{ github.token }}
