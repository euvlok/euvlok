name: Set up Nix and Bun dependencies
description: Install Nix, Bun, and repository dependencies for update workflows.

inputs:
  bun-version:
    description: Bun version to install.
    required: false
    default: 1.3.13
  cachix-cache:
    description: Cachix cache name.
    required: false
    default: euvlok
  cachix-auth-token:
    description: Cachix auth token used to push build results.
    required: false
    default: ""
  cachix-skip-push:
    description: Only use Cachix as a substituter without pushing build results.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: ./.github/actions/setup-nix
      with:
        github-token: ${{ github.token }}
        cachix-cache: ${{ inputs.cachix-cache }}
        cachix-auth-token: ${{ inputs.cachix-auth-token }}
        cachix-skip-push: ${{ inputs.cachix-skip-push }}

    - name: Set up Bun dependencies
      uses: ./.github/actions/setup-bun-dependencies
      with:
        bun-version: ${{ inputs.bun-version }}
