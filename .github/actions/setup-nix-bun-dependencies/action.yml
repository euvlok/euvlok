name: Set up Nix and Bun dependencies
description: Install Nix, Bun, and repository dependencies for update workflows.

inputs:
  bun-version:
    description: Bun version to install.
    required: false
    default: 1.3.13

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: ./.github/actions/setup-nix
      with:
        github-token: ${{ github.token }}

    - name: Set up Bun dependencies
      uses: ./.github/actions/setup-bun-dependencies
      with:
        bun-version: ${{ inputs.bun-version }}
