name: Set up Nix
description: Install Nix for repository workflows.

inputs:
  extra-nix-config:
    description: Additional Nix configuration appended to the installer config.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@786fff0690178f1234e4e1fe9b536e94f5433196 # v20
      with:
        determinate: false
        extra-conf: |
          accept-flake-config = true
          extra-substituters = https://devenv.cachix.org https://cache.flox.dev
          extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw= flox-cache-public-1:7F4OyH7ZCnFhcze3fJdfyXYLQw/aV7GEed86nQ7IsOs=
          ${{ inputs.extra-nix-config }}

    - name: Configure public binary caches
      shell: bash
      run: |
        public_nix_config="${RUNNER_TEMP}/public-nix-caches.conf"

        {
          echo "extra-substituters = https://devenv.cachix.org https://cache.flox.dev"
          echo "extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw= flox-cache-public-1:7F4OyH7ZCnFhcze3fJdfyXYLQw/aV7GEed86nQ7IsOs="
        } > "${public_nix_config}"

        export NIX_USER_CONF_FILES="${public_nix_config}:${NIX_USER_CONF_FILES}"
        echo "NIX_USER_CONF_FILES=${NIX_USER_CONF_FILES}" >> "${GITHUB_ENV}"

    - name: Show Nix cache configuration
      shell: bash
      run: |
        nix config show | sed -n '/^substituters = /p;/^trusted-public-keys = /p'
