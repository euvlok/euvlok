name: Build Nix flake target
description: Install Nix, configure Cachix, and build one flake target.

inputs:
  configuration-kind:
    description: Configuration kind to build. Supported values are nixos and darwin.
    required: true
  configuration-name:
    description: Configuration name from the flake output.
    required: true
  cachix-cache:
    description: Cachix cache name.
    required: true
  cachix-auth-token:
    description: Cachix auth token used to push build results.
    required: false
    default: ""
  cachix-skip-push:
    description: Only use Cachix as a substituter without pushing build results.
    required: false
    default: "false"
  github-token:
    description: GitHub token used by the Nix installer for GitHub fetches.
    required: true

runs:
  using: composite
  steps:
    - name: Check Cachix token
      shell: bash
      env:
        CACHIX_AUTH_TOKEN: ${{ inputs.cachix-auth-token }}
        CACHIX_SKIP_PUSH: ${{ inputs.cachix-skip-push }}
      run: |
        if [ "${CACHIX_SKIP_PUSH}" != "true" ] && [ -z "${CACHIX_AUTH_TOKEN}" ]; then
          echo "::error::CACHIX_AUTH_TOKEN is required unless cachix-skip-push is true."
          exit 1
        fi

    - name: Install Nix
      uses: ./.github/actions/setup-nix
      with:
        github-token: ${{ inputs.github-token }}

    - name: Configure Cachix
      uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: ${{ inputs.cachix-cache }}
        authToken: ${{ inputs.cachix-auth-token }}
        skipPush: ${{ inputs.cachix-skip-push }}

    - name: Build flake target
      shell: bash
      env:
        CONFIGURATION_KIND: ${{ inputs.configuration-kind }}
        CONFIGURATION_NAME: ${{ inputs.configuration-name }}
      run: |
        case "${CONFIGURATION_KIND}" in
          nixos)
            target=".#nixosConfigurations.${CONFIGURATION_NAME}.config.system.build.toplevel"
            ;;
          darwin)
            target=".#darwinConfigurations.${CONFIGURATION_NAME}.system"
            ;;
          *)
            echo "::error::Unsupported configuration kind: ${CONFIGURATION_KIND}"
            exit 1
            ;;
        esac

        nix build --print-build-logs "${target}"
