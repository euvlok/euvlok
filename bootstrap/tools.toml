# The catalog loader expands these shorthands:
# - omitted bins => the tool name, and string bins use "<bin> --version"
# - string links use the same value for link name and install-root path
# - when accepts "os" or "os-arch" strings, for example "linux-x86_64"
# - archive/source_build defaults are inherited by platform rows
# - package defaults to "uv tool install --upgrade --force"
# - build defaults to "cargo install --path {build_dir} --root {prefix} --force --locked"

[[tools]]
name = "chezmoi"

[tools.action]
type = "archive"
source = { type = "github_latest", repo = "twpayne/chezmoi", tag_prefix = "v", asset = "chezmoi_{version}_{platform}" }
links = ["chezmoi"]
platforms = [
  { when = "macos-aarch64", platform = "darwin_arm64.tar.gz" },
  { when = "linux-aarch64", platform = "linux_arm64.tar.gz" },
  { when = "linux-x86_64", platform = "linux_amd64.tar.gz" },
  { when = "windows-aarch64", platform = "windows_arm64.zip", links = [{ name = "chezmoi", path = "chezmoi.exe" }] },
  { when = "windows-x86_64", platform = "windows_amd64.zip", links = [{ name = "chezmoi", path = "chezmoi.exe" }] },
]

[[tools]]
name = "git"
platforms = ["macos", "linux", "windows"]
phase = "archives"

[tools.action]
type = "source_build"
version = "2.54.0"
kind = "tar_xz"
strip_components = 1
argv = ["make", "prefix={prefix}", "NO_GETTEXT=YesPlease", "NO_TCLTK=YesPlease", "NO_PERL=YesPlease", "NO_PYTHON=YesPlease", "NO_INSTALL_HARDLINKS=YesPlease", "-j{jobs}", "all", "install"]
sandbox_home = true
links = [{ name = "git", path = "bin/git" }]
platforms = [
  { when = "macos", platform = "macos", url = "https://www.kernel.org/pub/software/scm/git/git-{version}.tar.xz", archive_file = "git-{version}.tar.xz" },
  { when = "linux", platform = "linux", url = "https://www.kernel.org/pub/software/scm/git/git-{version}.tar.xz", archive_file = "git-{version}.tar.xz" },
  { when = "windows-x86_64", platform = "windows-amd64", url = "https://github.com/git-for-windows/git/releases/download/v{version}.windows.1/MinGit-{version}-64-bit.zip", archive_file = "MinGit-{version}-64-bit.zip", kind = "zip", strip_components = 0, argv = [], sandbox_home = false, links = [{ name = "git.cmd", path = "mingw64/bin/git.exe" }] },
  { when = "windows-aarch64", platform = "windows-arm64", url = "https://github.com/git-for-windows/git/releases/download/v{version}.windows.1/MinGit-{version}-arm64.zip", archive_file = "MinGit-{version}-arm64.zip", kind = "zip", strip_components = 0, argv = [], sandbox_home = false, links = [{ name = "git.cmd", path = "clangarm64/bin/git.exe" }] },
]

[[tools]]
name = "git-lfs"
bins = ["git-lfs"]

[tools.action]
type = "archive"
kind = "tar_gz"
strip_components = 1
source = { type = "github_latest", repo = "git-lfs/git-lfs", tag_prefix = "v", asset = "git-lfs-{platform}-v{version}.tar.gz" }
links = ["git-lfs"]
platforms = [
  { when = "macos-aarch64", platform = "darwin-arm64", kind = "zip", source = { type = "github_latest", repo = "git-lfs/git-lfs", tag_prefix = "v", asset = "git-lfs-{platform}-v{version}.zip" } },
  { when = "linux-aarch64", platform = "linux-arm64" },
  { when = "linux-x86_64", platform = "linux-amd64" },
  { when = "windows-aarch64", platform = "windows-arm64", kind = "zip", source = { type = "github_latest", repo = "git-lfs/git-lfs", tag_prefix = "v", asset = "git-lfs-{platform}-v{version}.zip" }, links = [{ name = "git-lfs", path = "git-lfs.exe" }] },
  { when = "windows-x86_64", platform = "windows-amd64", kind = "zip", source = { type = "github_latest", repo = "git-lfs/git-lfs", tag_prefix = "v", asset = "git-lfs-{platform}-v{version}.zip" }, links = [{ name = "git-lfs", path = "git-lfs.exe" }] },
]

[[tools]]
name = "uv"
bins = ["uv", "uvx"]

[tools.action]
type = "archive"
kind = "tar_gz"
strip_components = 1
source = { type = "github_latest", repo = "astral-sh/uv", tag_prefix = "v", asset = "uv-{platform}.tar.gz" }
links = ["uv", "uvx"]
platforms = [
  { when = "macos-aarch64", platform = "aarch64-apple-darwin" },
  { when = "linux-aarch64", platform = "aarch64-unknown-linux-musl" },
  { when = "linux-x86_64", platform = "x86_64-unknown-linux-musl" },
  { when = "windows-x86_64", platform = "x86_64-pc-windows-msvc", kind = "zip", strip_components = 0, source = { type = "github_latest", repo = "astral-sh/uv", tag_prefix = "v", asset = "uv-{platform}.zip" }, links = [{ name = "uv", path = "uv.exe" }, { name = "uvx", path = "uvx.exe" }] },
]

[[tools]]
name = "rustup"
bins = ["rustup", "cargo", "rustc", "rustfmt", "cargo-clippy", "rust-analyzer"]

[tools.action]
type = "toolchain"
manager_bin = "rustup"
name = "stable-{host_triple}"
name_env = "BOOTSTRAP_RUST_TOOLCHAIN"
bin_dir = { env_var = "CARGO_HOME", home_relative = ".cargo/bin" }
components = ["rustfmt", "clippy", "rust-analyzer", "rust-src"]
update_argv = ["{manager_bin}", "toolchain", "install", "{toolchain}", "--profile", "minimal", "--force-non-host", "{components}"]
active_argv = ["{manager_bin}", "show", "active-toolchain"]
default_argv = ["{manager_bin}", "default", "{toolchain}", "--force-non-host"]
component_argv = ["--component", "{component}"]

[tools.action.install]
file = "rustup-init"
argv = ["{file}", "-y", "--profile", "minimal", "--default-toolchain", "{toolchain}", "{components}"]
platforms = [
  { when = "macos-aarch64", url = "https://static.rust-lang.org/rustup/dist/aarch64-apple-darwin/rustup-init" },
  { when = "linux-aarch64", url = "https://static.rust-lang.org/rustup/dist/aarch64-unknown-linux-gnu/rustup-init" },
  { when = "linux-x86_64", url = "https://static.rust-lang.org/rustup/dist/x86_64-unknown-linux-gnu/rustup-init" },
  { when = "windows-aarch64", url = "https://static.rust-lang.org/rustup/dist/aarch64-pc-windows-msvc/rustup-init.exe", file = "rustup-init.exe" },
  { when = "windows-x86_64", url = "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe", file = "rustup-init.exe" },
]

[[tools]]
name = "node"
bins = ["node", "npm", "npx"]

[tools.action]
type = "archive"
kind = "tar_xz"
strip_components = 1
source = { type = "version_index", index_url = "https://nodejs.org/dist/index.json", url = "https://nodejs.org/dist/{version}/node-{version}-{platform}.tar.xz" }
links = [{ name = "node", path = "bin/node" }, { name = "npm", path = "bin/npm" }, { name = "npx", path = "bin/npx" }]
platforms = [
  { when = "macos-aarch64", platform = "darwin-arm64" },
  { when = "linux-aarch64", platform = "linux-arm64" },
  { when = "linux-x86_64", platform = "linux-x64" },
  { when = "windows-x86_64", platform = "win-x64", kind = "zip", source = { type = "version_index", index_url = "https://nodejs.org/dist/index.json", url = "https://nodejs.org/dist/{version}/node-{version}-{platform}.zip" }, links = [{ name = "node", path = "node.exe" }, { name = "npm", path = "npm.cmd" }, { name = "npx", path = "npx.cmd" }] },
]

