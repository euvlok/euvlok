[[tools]]
name = "vscode"
platforms = ["macos", "linux", "windows"]
bins = [{ name = "code", version_argv = ["code", "--version"] }]

[tools.action]
type = "archive"
source = { type = "direct", version = "latest", url = "https://update.code.visualstudio.com/latest/{platform}/stable" }
platforms = [
  { when = "macos-aarch64", platform = "darwin-arm64", kind = "zip", links = [{ name = "code", path = "Visual Studio Code.app/Contents/Resources/app/bin/code" }], app_links = [{ name = "Visual Studio Code.app", path = "Visual Studio Code.app" }] },
  { when = "linux-aarch64", platform = "linux-arm64", kind = "tar_gz", strip_components = 1, links = [{ name = "code", path = "bin/code" }] },
  { when = "linux-x86_64", platform = "linux-x64", kind = "tar_gz", strip_components = 1, links = [{ name = "code", path = "bin/code" }] },
  { when = "windows-aarch64", platform = "win32-arm64-archive", kind = "zip", links = [{ name = "code", path = "bin/code.cmd" }] },
  { when = "windows-x86_64", platform = "win32-x64-archive", kind = "zip", links = [{ name = "code", path = "bin/code.cmd" }] },
]

