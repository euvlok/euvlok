[[tools]]
name = "chezmoi"

[[tools.bins]]
name = "chezmoi"
version_argv = ["chezmoi", "--version"]

[tools.action]
type = "archive"
source = { type = "github_latest", repo = "twpayne/chezmoi", tag_prefix = "v", asset = "chezmoi_{version}_{platform}" }

[[tools.action.platforms]]
when = { os = "macos", arch = "aarch64" }
platform = "darwin_arm64.tar.gz"
kind = "tar_gz"
strip_components = 0
links = [{ name = "chezmoi", path = "chezmoi" }]

[[tools.action.platforms]]
when = { os = "linux", arch = "aarch64" }
platform = "linux_arm64.tar.gz"
kind = "tar_gz"
strip_components = 0
links = [{ name = "chezmoi", path = "chezmoi" }]

[[tools.action.platforms]]
when = { os = "linux", arch = "x86_64" }
platform = "linux_amd64.tar.gz"
kind = "tar_gz"
strip_components = 0
links = [{ name = "chezmoi", path = "chezmoi" }]

[[tools.action.platforms]]
when = { os = "windows", arch = "aarch64" }
platform = "windows_arm64.zip"
kind = "zip"
strip_components = 0
links = [{ name = "chezmoi", path = "chezmoi.exe" }]

[[tools.action.platforms]]
when = { os = "windows", arch = "x86_64" }
platform = "windows_amd64.zip"
kind = "zip"
strip_components = 0
links = [{ name = "chezmoi", path = "chezmoi.exe" }]

[[tools]]
name = "git"
platforms = ["macos", "linux", "windows"]
phase = "archives"

[[tools.bins]]
name = "git"
version_argv = ["git", "--version"]

[tools.action]
type = "source_build"
version = "2.54.0"

[[tools.action.platforms]]
when = { os = "macos" }
platform = "macos"
url = "https://www.kernel.org/pub/software/scm/git/git-{version}.tar.xz"
archive_file = "git-{version}.tar.xz"
kind = "tar_xz"
strip_components = 1
argv = ["make", "prefix={prefix}", "NO_GETTEXT=YesPlease", "NO_TCLTK=YesPlease", "NO_PERL=YesPlease", "NO_PYTHON=YesPlease", "NO_INSTALL_HARDLINKS=YesPlease", "-j{jobs}", "all", "install"]
sandbox_home = true
links = [{ name = "git", path = "bin/git" }]

[[tools.action.platforms]]
when = { os = "linux" }
platform = "linux"
url = "https://www.kernel.org/pub/software/scm/git/git-{version}.tar.xz"
archive_file = "git-{version}.tar.xz"
kind = "tar_xz"
strip_components = 1
argv = ["make", "prefix={prefix}", "NO_GETTEXT=YesPlease", "NO_TCLTK=YesPlease", "NO_PERL=YesPlease", "NO_PYTHON=YesPlease", "NO_INSTALL_HARDLINKS=YesPlease", "-j{jobs}", "all", "install"]
sandbox_home = true
links = [{ name = "git", path = "bin/git" }]

[[tools.action.platforms]]
when = { os = "windows", arch = "x86_64" }
platform = "windows-amd64"
url = "https://github.com/git-for-windows/git/releases/download/v{version}.windows.1/MinGit-{version}-64-bit.zip"
archive_file = "MinGit-{version}-64-bit.zip"
kind = "zip"
strip_components = 0
argv = []
links = [{ name = "git.cmd", path = "mingw64/bin/git.exe" }]

[[tools.action.platforms]]
when = { os = "windows", arch = "aarch64" }
platform = "windows-arm64"
url = "https://github.com/git-for-windows/git/releases/download/v{version}.windows.1/MinGit-{version}-arm64.zip"
archive_file = "MinGit-{version}-arm64.zip"
kind = "zip"
strip_components = 0
argv = []
links = [{ name = "git.cmd", path = "clangarm64/bin/git.exe" }]

