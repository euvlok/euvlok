[[tools]]
name = "rustup"

[[tools.bins]]
name = "rustup"
version_argv = ["rustup", "--version"]

[[tools.bins]]
name = "cargo"
version_argv = ["cargo", "--version"]

[[tools.bins]]
name = "rustc"
version_argv = ["rustc", "--version"]

[[tools.bins]]
name = "rustfmt"
version_argv = ["rustfmt", "--version"]

[[tools.bins]]
name = "cargo-clippy"
version_argv = ["cargo-clippy", "--version"]

[[tools.bins]]
name = "rust-analyzer"
version_argv = ["rust-analyzer", "--version"]

[tools.action]
type = "toolchain"
manager_bin = "rustup"
name = "stable-{host_triple}"
name_env = "BOOTSTRAP_RUST_TOOLCHAIN"
bin_dir = { env_var = "CARGO_HOME", home_relative = ".cargo/bin" }
components = ["rustfmt", "clippy", "rust-analyzer", "rust-src"]
update_argv = ["{manager_bin}", "toolchain", "install", "{toolchain}", "--profile", "minimal", "--force-non-host", "{components}"]
active_argv = ["{manager_bin}", "show", "active-toolchain"]
default_argv = ["{manager_bin}", "default", "{toolchain}", "--force-non-host"]
component_argv = ["--component", "{component}"]

[tools.action.install]
platforms = [
  { when = { os = "macos", arch = "aarch64" }, url = "https://static.rust-lang.org/rustup/dist/aarch64-apple-darwin/rustup-init", file = "rustup-init", argv = ["{file}", "-y", "--profile", "minimal", "--default-toolchain", "{toolchain}", "{components}"] },
  { when = { os = "linux", arch = "aarch64" }, url = "https://static.rust-lang.org/rustup/dist/aarch64-unknown-linux-gnu/rustup-init", file = "rustup-init", argv = ["{file}", "-y", "--profile", "minimal", "--default-toolchain", "{toolchain}", "{components}"] },
  { when = { os = "linux", arch = "x86_64" }, url = "https://static.rust-lang.org/rustup/dist/x86_64-unknown-linux-gnu/rustup-init", file = "rustup-init", argv = ["{file}", "-y", "--profile", "minimal", "--default-toolchain", "{toolchain}", "{components}"] },
  { when = { os = "windows", arch = "aarch64" }, url = "https://static.rust-lang.org/rustup/dist/aarch64-pc-windows-msvc/rustup-init.exe", file = "rustup-init.exe", argv = ["{file}", "-y", "--profile", "minimal", "--default-toolchain", "{toolchain}", "{components}"] },
  { when = { os = "windows", arch = "x86_64" }, url = "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe", file = "rustup-init.exe", argv = ["{file}", "-y", "--profile", "minimal", "--default-toolchain", "{toolchain}", "{components}"] },
]

