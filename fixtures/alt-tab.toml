listen = "127.0.0.1:18081"

[[hosts]]
domain = "alt-tab.app"
aliases = ["api.alt-tab.app"]

[hosts.pass_through]
host = "alt-tab.app"
scheme = "https"
port = 443
resolvers = ["1.1.1.1", "8.8.8.8"]
versions = ["ipv4"]
website_prefix = "/website"
paths = ["/appcast.xml", "/changelog-bare"]
path_prefixes = ["/public/"]

[[routes]]
name = "landing"
method = "GET"
path = "/"
body_html = """
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>http-fixture</title>
<style>
body { margin: 8px; font: 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
pre { margin: 0; white-space: pre-wrap; }
</style>
</head>
<body>
<pre>http-fixture is active

This fixture config lives at fixtures/alt-tab.toml It is served
locally through alt-tab.app and api.alt-tab.app

The real website is mounted at <a href="https://alt-tab.app/website">https://alt-tab.app/website</a>
</pre>
</body>
</html>
"""

[[routes]]
name = "health"
method = "GET"
path = "/health"
body_json = { ok = true, service = "http-fixture", fixture = "alt-tab" }

[[routes]]
name = "example API"
method = "POST"
path = "/api/v1/example"
body_json = { ok = true, fixture = "alt-tab" }

[[routes]]
name = "license activate"
method = "POST"
path = "/api/v1/license/activate"

[routes.body_json]
activated = true
instance_id = "instance-0001"
variant_id = "0001"
customer_email = "alt-tab@ps1.sh"

[[routes]]
name = "license validate"
method = "POST"
path = "/api/v1/license/validate"

[routes.body_json]
valid = true
variant_id = "fixture-variant"

[[routes]]
name = "license deactivate"
method = "POST"
path = "/api/v1/license/deactivate"

[routes.body_json]
deactivated = true
