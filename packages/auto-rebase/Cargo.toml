[package]
name = "auto-rebase"
version = "0.1.0"
edition = "2024"
description = "Synchronize jj workspaces with Git remotes and safely rebase local work."
repository = "https://github.com/euvlok/euvlok"
license = "MIT"
readme = "../../README.md"
keywords = ["git", "jj", "rebase", "cli"]
categories = ["command-line-utilities", "development-tools"]
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
clap.workspace = true
futures.workspace = true
gix.workspace = true
jj-lib.workspace = true
notify.workspace = true
pollster.workspace = true

[dev-dependencies]
tempfile.workspace = true
