[package]
name = "auto-rebase"
version = "0.1.0"
edition = "2024"
description = "Synchronize jj workspaces with Git remotes and safely rebase local work."
repository = "https://github.com/euvlok/euvlok"
license = "MIT"
readme = "../../README.md"
keywords = ["git", "jj", "rebase", "cli"]
categories = ["command-line-utilities", "development-tools"]
publish = false

[lints]
workspace = true

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
futures = "0.3.32"
gix = { version = "0.83.0", features = ["blocking-network-client"] }
jj-lib = "0.41.0"
notify = "8.2.0"
pollster = "0.4.0"

[dev-dependencies]
tempfile = "3.27.0"
