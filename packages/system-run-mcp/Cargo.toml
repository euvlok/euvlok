[package]
name = "system-run-mcp"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "system-run-mcp"
path = "src/main.rs"

[[bin]]
name = "system-runner"
path = "src/system_runner.rs"

[dependencies]
clap.workspace = true
indexmap.workspace = true
process-wrap = { version = "9.1.0", default-features = false, features = ["process-group", "tokio1"] }
rmcp.workspace = true
serde.workspace = true
tokio = { workspace = true, features = ["io-util", "process", "time"] }
tokio-util.workspace = true
which.workspace = true

[dev-dependencies]
tempfile.workspace = true

[lints]
workspace = true
